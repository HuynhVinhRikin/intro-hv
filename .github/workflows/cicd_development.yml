name: CI/CD - Development

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    environment: Development
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      IMAGE: ${{ steps.tags_output.outputs.IMAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: |
          node --check src/index.js
          node --check src/es.js
          node --check src/routes/products.js

      - name: Prepare SHORT SHA and IMAGE_TAG
        id: tags_output
        run: |
          SHORT_SHA=${GITHUB_SHA: -6}
          IMAGE_OUTPUT=${IMAGE_NAME}:${SHORT_SHA}

          echo "IMAGE=$IMAGE_OUTPUT" >> $GITHUB_ENV
          echo "IMAGE=$IMAGE_OUTPUT" >> $GITHUB_OUTPUT

      - name: Show image tag
        run: echo "Will build and push $IMAGE"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags_output.outputs.IMAGE }}


  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    environment: Development
    steps:
      - name: Prepare SHORT SHA and IMAGE_TAG
        id: tags_output
        run: |
          SHORT_SHA=${GITHUB_SHA: -6}
          IMAGE_OUTPUT=${IMAGE_NAME}:${SHORT_SHA}

          echo "IMAGE=$IMAGE_OUTPUT" >> $GITHUB_ENV
          echo "IMAGE=$IMAGE_OUTPUT" >> $GITHUB_OUTPUT

      - name: SSH deploy - send deploy script & run it
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/techdevops
            export IMAGE="${{ steps.tags_output.outputs.IMAGE }}"
            echo "Deploying $IMAGE to development server"

            BE_IMAGE=$IMAGE docker-compose pull app && BE_IMAGE=$IMAGE docker-compose up -d app